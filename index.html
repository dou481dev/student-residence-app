<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>إستمارة التسجيل في خدمة الإيواء</title>

    <!-- Bootstrap -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Your custom CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="main-container">

    <div class="form-card">

        <div class="header-section">

            <div class="icon-badge">
                <i class="bi bi-person-fill-add"></i>
            </div>

            <h1 class="form-title">
                إستمارة التسجيل في خدمة الإيواء لسنة 2026-2027
            </h1>

            <p class="form-subtitle">
                يرجى التأكد من جميع المعلومات قبل إرسال الطلب
            </p>

        </div>

        <form id="applicationForm" novalidate>

            <!-- ========================= -->
            <!-- Personal Information -->
            <!-- ========================= -->

            <div class="form-section">

                <h3 class="section-title">
                    <i class="bi bi-person-circle me-2"></i>
                    المعلومات الشخصية
                </h3>

                <div class="row g-4">

                    <div class="col-md-4">

                        <label class="form-label">
                            <i class="bi bi-person"></i>
                            الإسم واللقب
                            <span class="required-asterisk">*</span>
                        </label>

                        <input
                                id="name"
                                class="form-control"
                                type="text"
				placeholder="الإسم واللقب"
                                required
                                autocomplete="name">

                        <div class="invalid-feedback">
                            يرجى إدخال الإسم واللقب
                        </div>

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">
                            <i class="bi bi-phone"></i>
                            رقم الهاتف
                            <span class="required-asterisk">*</span>
                        </label>

                        <div class="input-group">

                            <span class="input-group-text">
                                +213
                            </span>

                            <input
                                    id="mobile"
                                    class="form-control"
                                    type="tel"
                                    maxlength="10"
				    pattern="[0-9]{10}"
				    placeholder="0550123456"
                                    required>

                        </div>

                        <div class="invalid-feedback">
                            رقم هاتف غير صالح
                        </div>

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">

                            <i class="bi bi-envelope"></i>

                            البريد الإلكتروني

                            <span class="required-asterisk">*</span>

                        </label>

                        <input
                                id="email"
                                class="form-control"
                                type="email"
				placeholder="example@gmail.com"
                                required>

                        <div class="invalid-feedback">

                            بريد إلكتروني غير صالح

                        </div>

                    </div>

                </div>

            </div>

            <!-- ========================= -->
            <!-- Additional Information -->
            <!-- ========================= -->

            <div class="form-section">

                <h3 class="section-title">

                    <i class="bi bi-card-text me-2"></i>

                    معلومات إضافية

                </h3>

                <div class="row g-4">

                    <div class="col-md-4">

                        <label class="form-label">

                            <i class="bi bi-calendar"></i>

                            تاريخ الميلاد

                            <span class="required-asterisk">*</span>

                        </label>

                        <input
                                id="dob"
                                type="date"
                                class="form-control"
                                required>

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">

                            <i class="bi bi-person-badge"></i>

                            الجنس

                            <span class="required-asterisk">*</span>

                        </label>

                        <select
                                id="gender"
                                class="form-select"
                                required>

                            <option value="">
                                إختر الجنس
                            </option>

                            <option value="Male">
                                ذكر
                            </option>

                            <option value="Female">
                                أنثى
                            </option>

                        </select>

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">

                            <i class="bi bi-geo-alt"></i>

                            بلدية الإقامة

                            <span class="required-asterisk">*</span>

                        </label>

                        <select
                                id="state"
                                class="form-select"
                                required>

                            <option>
                                جاري تحميل البلديات...
                            </option>

                        </select>

                    </div>

                </div>

            </div>

            <!-- ========================= -->
            <!-- University Information -->
            <!-- ========================= -->

            <div class="form-section">

                <h3 class="section-title">

                    <i class="bi bi-mortarboard"></i>

                    المعلومات الجامعية

                </h3>

                <div class="row g-4">

                    <div class="col-md-4">

                        <label class="form-label">

                            رقم التسجيل

                            <span class="required-asterisk">*</span>

                        </label>

                        <input
                                id="bac"
                                class="form-control"
                                type="text"
                                maxlength="8"
				pattern="[0-9]{8}"
				placeholder="37......"
                                required>

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">

                            سنة الحصول على البكالوريا

                            <span class="required-asterisk">*</span>

                        </label>

                        <input
                                id="year"
                                class="form-control"
                                type="text"
                                maxlength="4"
				pattern="[0-9]{4}"
				placeholder="2026"
                                required>

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">

                            شهادة الإقامة / شهادة بعد المسافة

                            <span class="required-asterisk">*</span>

                        </label>

                        <input
                                id="residenceFile"
                                class="form-control"
                                type="file"
                                accept="application/pdf"
                                required>

                    </div>

                </div>

            </div>

            <div class="text-center mt-5">

                <button
                        id="submitBtn"
                        class="btn btn-primary btn-lg"
                        type="submit">

                    <i class="bi bi-send me-2"></i>

                    تأكيد الطلب

                </button>

            </div>

        </form>

        <div id="messageDiv"></div>

    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>

<script src="validation.js"></script>
<script src="app.js"></script>

</body>
</html>
